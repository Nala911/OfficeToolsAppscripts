<!-- Section: Transactions -->
<div class="section" data-category="Transactions" data-roles="all">
  <div class="section-title"><span>💳</span> Transactions</div>
  <div class="tool-group">
    <div class="input-group">
      <label for="txnId">ID Reference</label>
      <input type="text" id="txnId" placeholder="e.g. 1001 or TXN-1001">
    </div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
      <button onclick="runTool({namespace: 'FormattingTools', method: 'highlightTransaction'}, 'txnId')" id="btn-highlight">Highlight</button>
      <button onclick="runTool({namespace: 'TransactionTools', method: 'generateLetter'}, 'txnId')" id="btn-letter">Export PDF</button>
    </div>
    <button onclick="runTool({namespace: 'TransactionTools', method: 'removeOldTransactions'}, 'txnId')" id="btn-remove" style="background: var(--danger);">
      <span>🗑️</span> Purge History
    </button>
  </div>
</div>
