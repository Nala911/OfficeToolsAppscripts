<style>
  :root {
    --primary: #6366f1;
    --primary-hover: #4f46e5;
    --secondary: #64748b;
    --accent: #ec4899;
    --danger: #ef4444;
    --bg-main: #f8fafc;
    --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
    --glass-bg: rgba(255, 255, 255, 0.7);
    --glass-border: rgba(255, 255, 255, 0.4);
    --text-main: #1e293b;
    --text-muted: #64748b;
    --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
    --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
    --radius: 12px;
    --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  * {
    box-sizing: border-box;
    -webkit-font-smoothing: antialiased;
  }

  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg-gradient);
    color: var(--text-main);
    margin: 0;
    padding: 0;
    font-size: 14px;
    line-height: 1.6;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* Header Branding */
  .sidebar-header {
    background: var(--glass-bg);
    backdrop-filter: blur(12px);
    padding: 20px 16px;
    border-bottom: 1px solid var(--glass-border);
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .sidebar-header h2 {
    margin: 0;
    font-size: 1.25rem;
    font-weight: 700;
    background: linear-gradient(to right, var(--primary), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* Main Container */
  .container {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scrollbar-width: thin;
    scrollbar-color: var(--secondary) transparent;
  }

  /* Tool Sections (Cards) */
  .section {
    background: var(--glass-bg);
    backdrop-filter: blur(8px);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow-md);
    transition: var(--transition);
    animation: slideUp 0.5s ease-out backwards;
  }

  .section:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-lg);
    border-color: rgba(99, 102, 241, 0.2);
  }

  .section.hidden {
    display: none;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .section-title {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--primary);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* Tool Layouts */
  .tool-group {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  label {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-muted);
    margin-left: 2px;
  }

  /* Enhanced Inputs */
  input[type="text"],
  input[type="number"],
  select {
    width: 100%;
    padding: 12px 14px;
    background: rgba(255, 255, 255, 0.5);
    border: 1px solid var(--glass-border);
    border-radius: 8px;
    outline: none;
    font-family: inherit;
    font-size: 14px;
    color: var(--text-main);
    transition: var(--transition);
  }

  input:focus,
  select:focus {
    background: #fff;
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
  }

  /* Premium Buttons */
  button {
    width: 100%;
    padding: 12px 16px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: var(--transition);
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.2);
  }

  button:hover:not(:disabled) {
    background: var(--primary-hover);
    transform: scale(1.02);
    box-shadow: 0 6px 12px -2px rgba(99, 102, 241, 0.3);
  }

  button:active:not(:disabled) {
    transform: scale(0.98);
  }

  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    background: var(--secondary);
  }

  /* Success/Error Toast */
  #status {
    position: fixed;
    bottom: 24px;
    left: 24px;
    right: 24px;
    padding: 16px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    z-index: 1000;
    display: none;
    animation: toastSlide 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: var(--shadow-lg);
  }

  @keyframes toastSlide {
    from { transform: translateY(100px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .success {
    display: block !important;
    background: rgba(16, 185, 129, 0.95);
    color: white;
    backdrop-filter: blur(10px);
    border-left: 4px solid #065f46;
  }

  .error {
    display: block !important;
    background: rgba(239, 68, 68, 0.95);
    color: white;
    backdrop-filter: blur(10px);
    border-left: 4px solid #991b1b;
  }

  /* Interaction Feedbacks */
  .loading-spinner {
    width: 18px;
    height: 18px;
    border: 3px solid rgba(255, 255, 255, 0.3);
    border-radius: 50%;
    border-top-color: #fff;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Custom Scrollbar */
  .container::-webkit-scrollbar { width: 6px; }
  .container::-webkit-scrollbar-track { background: transparent; }
  .container::-webkit-scrollbar-thumb { 
    background: rgba(100, 116, 139, 0.2); 
    border-radius: 10px; 
    transition: background 0.2s;
  }
  .container::-webkit-scrollbar-thumb:hover { background: rgba(100, 116, 139, 0.5); }
</style>
