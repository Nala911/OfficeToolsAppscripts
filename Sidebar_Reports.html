<!-- Section: Reports -->
<div class="section" data-category="Reports" data-roles="all">
  <div class="section-title"><span>📂</span> Reports & Analytics</div>
  <div class="tool-group">
    <div class="input-group">
      <label for="depts">Filter Departments</label>
      <input type="text" id="depts" placeholder="Optional: HR, Finance...">
    </div>
    <button onclick="runTool({namespace: 'ReportTools', method: 'exportDepartments'}, 'depts')" id="btn-export">
      Generate Report PDF
    </button>
  </div>
</div>

<!-- Section: Status Update -->
<div class="section" data-category="Reports" data-roles="all">
  <div class="section-title"><span>🔄</span> Dynamic Status Update</div>
  <div class="tool-group">
    <div class="input-group">
      <label for="statusDept">Target Department</label>
      <select id="statusDept">
        <option value="">Loading departments...</option>
      </select>
    </div>
    <div class="input-group">
      <label for="statusVal">New Status</label>
      <select id="statusVal">
        <option value="Paid">Paid</option>
        <option value="Pending">Pending</option>
      </select>
    </div>
    <button onclick="runTool({namespace: 'ReportTools', method: 'updateDepartmentStatus'}, ['statusDept', 'statusVal'])" id="btn-status">
      Execute Update
    </button>
  </div>
</div>
