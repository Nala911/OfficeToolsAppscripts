<!-- Section: Calculations -->
<div class="section" data-category="Calculations" data-roles="all">
  <div class="section-title"><span>📊</span> Calculations</div>
  <div class="tool-group">
    <div class="input-group">
      <label for="deductAmount">Target Amount</label>
      <input type="number" id="deductAmount" placeholder="e.g. 500.00" step="0.01">
    </div>
    <button onclick="runTool({namespace: 'FinanceTools', method: 'deductAmounts'}, 'deductAmount')" id="btn-deduct">
      Apply Deduction Flow
    </button>
  </div>
</div>
