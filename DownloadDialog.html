<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; color: #333; }
      .dept-list { max-height: 200px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; margin: 15px 0; background: #f9f9f9; }
      .btn { background: #1a73e8; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; width: 100%; }
      .btn:disabled { background: #ccc; cursor: not-allowed; }
      #status { margin-top: 15px; font-size: 0.9em; font-weight: bold; }
      .error-msg { color: #d93025; background: #fce8e6; padding: 10px; border-radius: 4px; margin-top: 10px; display: none; word-wrap: break-word; }
    </style>
  </head>
  <body>
    <strong>Select Departments:</strong>
    <div class="dept-list">
      <? departments.forEach(dept => { ?>
        <label><input type="checkbox" name="dept" value="<?= dept ?>"> <?= dept ?></label><br>
      <? }) ?>
    </div>
    
    <button class="btn" id="dlBtn" onclick="startExport()">Generate & Download</button>
    <div id="status"></div>
    <div id="errorBox" class="error-msg"></div>

    <script>
      function startExport() {
        const checkboxes = document.querySelectorAll('input[name="dept"]:checked');
        const selected = Array.from(checkboxes).map(cb => cb.value);
        const status = document.getElementById('status');
        const errorBox = document.getElementById('errorBox');
        
        if (selected.length === 0) {
          alert("Please select at least one department.");
          return;
        }

        // Reset UI
        errorBox.style.display = "none";
        document.getElementById('dlBtn').disabled = true;
        status.innerText = "⏳ Connecting to server...";

        google.script.run
          .withSuccessHandler(function(result) {
            if (result.success) {
              status.innerText = "✅ Download starting!";
              downloadFile(result);
            } else {
              showError("Server Error: " + result.error);
            }
          })
          .withFailureHandler(function(err) {
            showError("System Error: " + err.message);
          })
          .processSelection(selected);
      }

      function showError(msg) {
        const errorBox = document.getElementById('errorBox');
        errorBox.innerText = msg;
        errorBox.style.display = "block";
        document.getElementById('status').innerText = "";
        document.getElementById('dlBtn').disabled = false;
      }

      function downloadFile(data) {
        const link = document.createElement('a');
        link.href = 'data:application/pdf;base64,' + data.bytes;
        link.download = data.fileName;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        setTimeout(() => google.script.host.close(), 3000);
      }
    </script>
  </body>
</html>
